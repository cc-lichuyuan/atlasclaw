<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title">AtlasClaw</title>
    <!-- Deep Chat - loaded globally for chat page -->
    <script type="module" src="/static/deepChat.bundle.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="/styles/main.css?v=11">
    <link rel="stylesheet" href="/styles/channels.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/mention.css">
    <script>
        (() => {
            const routeStyles = [
                { match: /^\/admin\/users\/?$/, id: 'admin-users-page-css', href: '/styles/admin-users.css' },
                { match: /^\/account\/?$/, id: 'account-settings-page-css', href: '/styles/account-settings.css' },
                { match: /^\/models\/?$/, id: 'models-page-css', href: '/styles/models.css' }
            ]

            const pathname = window.location.pathname
            const target = routeStyles.find(({ match }) => match.test(pathname))

            if (!target || document.getElementById(target.id)) {
                return
            }

            const cssLink = document.createElement('link')
            cssLink.rel = 'stylesheet'
            cssLink.href = target.href
            cssLink.id = target.id
            document.head.appendChild(cssLink)
        })()
    </script>
</head>
<body>
    <!-- SPA Layout Shell -->
    <aside id="sidebar" class="sidebar"></aside>
    <main id="main-content" class="main-content">
        <header id="app-header" class="chat-header"></header>
        <div id="page-content"></div>
    </main>
    <div id="toast-container" class="toast-container"></div>

    <!-- SPA Entry Point -->
    <script type="module" src="/scripts/main.js"></script>
</body>
</html>
